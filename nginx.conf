server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Liveness endpoint for container healthchecks (kept above the SPA fallback
    # so it isn't swallowed by try_files).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
